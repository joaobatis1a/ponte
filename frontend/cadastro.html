  <!DOCTYPE html>
  <html lang="pt-BR">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro · P.O.N.T.E.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/cadastro.css"/>
  </head>
  <body>
  <main class="card" id="card" role="main">
    <header class="topbar">
      <button type="button" class="icon-btn" aria-label="Ajuda" data-toast="Precisa de ajuda? Estamos aqui 🦀">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
      <a class="brand" href="index.html">
        <img src="assets/logo-1.png" alt="Mascote P.O.N.T.E." width="56" height="56" />
      </a>
      <button type="button" class="icon-btn" aria-label="Fechar" data-toast="Saída cancelada — segue o jogo!">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </header>
    <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="15">
      <div class="progress-bar" id="progressBar" style="width:15%"></div>
    </div>
    <div id="stepRoot"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/cadastro.js"></script>
  </body>
  </html>
